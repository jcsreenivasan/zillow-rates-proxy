<style>
  /* ── Base ── */
  #zr-root {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    color: #1a0e00;
    box-sizing: border-box;
    background: #ffffff;
    padding: 32px 24px;
    border-radius: 20px;
  }
  #zr-root * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Toggle ── */
  #zr-toggle-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
  }
  #zr-toggle {
    display: inline-flex;
    gap: 4px;
    background: #e8e2da;
    border-radius: 999px;
    padding: 4px;
  }
  .zr-toggle-btn {
    border: none;
    background: transparent;
    border-radius: 999px;
    padding: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    color: #7a6e65;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .zr-toggle-btn.zr-active {
    background: #1a0e00;
    color: #ffffff;
  }

  /* ── Tabs ── */
  #zr-tabs-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
  }
  #zr-tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .zr-tab {
    border: 1.5px solid #d4cdc5;
    border-radius: 999px;
    padding: 8px;
    font-size: 0.87rem;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    background: transparent;
    color: #7a6e65;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .zr-tab.zr-active {
    background: #1a0e00;
    color: #ffffff;
    border-color: #1a0e00;
  }
  .zr-tab:not(.zr-active):hover {
    border-color: #1a0e00;
    color: #1a0e00;
  }

  /* ── Cards grid ── */
  #zr-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  /* ── Card ── */
  .zr-rate-card {
    background: #f1f1f1;
    border-radius: 16px;
    padding: 28px 28px 28px 28px;
    display: flex;
    flex-direction: column;
  }

  .zr-card-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #1a0e00;
    margin-bottom: 18px;
    line-height: 1.4;
  }

  .zr-rate-num {
    font-size: 2.5rem;
    font-weight: 700;
    color: #1a0e00;
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .zr-rate-label {
    font-size: 0.82rem;
    color: #9a9087;
    font-weight: 400;
  }

  .zr-card-divider {
    height: 1px;
    background: #ede9e4;
    margin: 16px 0;
  }

  /* Points row — orange style like the reference comparison text */
  .zr-points-row {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    margin-top: 16px;
  }
  .zr-points-arrow {
    color: #d94f00;
    font-size: 1.05rem;
    flex-shrink: 0;
    line-height: 1.3;
  }
  .zr-points-text {
    font-size: 0.82rem;
    color: #4a4540;
    line-height: 1.4;
  }
  .zr-points-value {
    color: #d94f00;
    font-weight: 600;
  }

  /* ── Footer ── */
  #zr-footer {
    display: none;
    align-items: center;
    justify-content: space-between;
    margin-top: 20px;
    padding: 0 4px;
  }
  #zr-footer-left { font-size: 0.72rem; color: #b0a89e; }
  #zr-footer-left a { color: #d94f00; text-decoration: none; }
  #zr-footer-left a:hover { text-decoration: underline; }
  #zr-timestamp { font-size: 0.72rem; color: #b0a89e; text-align: right; }

  /* ── Loading ── */
  #zr-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 48px 0;
  }
  .zr-spinner {
    width: 36px; height: 36px;
    border: 3px solid #e8e2da;
    border-top-color: #1a0e00;
    border-radius: 50%;
    animation: zr-spin 0.75s linear infinite;
  }
  @keyframes zr-spin { to { transform: rotate(360deg); } }
  #zr-loading p { color: #9a9087; font-size: 0.9rem; }

  /* ── Error ── */
  #zr-error { display: none; text-align: center; padding: 48px 0; }
  #zr-error p { color: #666; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.6; }
  #zr-retry-btn {
    background: #1a0e00;
    color: #ffffff;
    border: none;
    border-radius: 999px;
    padding: 12px 36px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  #zr-retry-btn:hover { opacity: 0.75; }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    #zr-cards { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 680px) {
    .zr-toggle-btn { padding: 9px 24px; }
    #zr-cards { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .zr-rate-card { padding: 22px 18px; }
    .zr-rate-num  { font-size: 2.1rem; }
  }
  @media (max-width: 400px) {
    #zr-cards { grid-template-columns: 1fr; }
    #zr-root  { padding: 20px 16px; }
  }
</style>

<div id="zr-root">

  <div id="zr-toggle-wrap">
    <div id="zr-toggle">
      <button class="zr-toggle-btn zr-active" data-mode="purchase">Purchase</button>
      <button class="zr-toggle-btn"            data-mode="refinance">Refinance</button>
    </div>
  </div>

  <div id="zr-tabs-wrap">
    <div id="zr-tabs">
      <button class="zr-tab zr-active" data-tab="30yr">30 Yr Fixed</button>
      <button class="zr-tab"           data-tab="15yr">15 Yr Fixed</button>
      <button class="zr-tab"           data-tab="va">VA</button>
    </div>
  </div>

  <div id="zr-loading">
    <div class="zr-spinner"></div>
    <p>Loading current rates…</p>
  </div>

  <div id="zr-error">
    <p>⚠️ Unable to load mortgage rates right now.<br>Please try again in a moment.</p>
    <button id="zr-retry-btn">Try Again</button>
  </div>

  <div id="zr-cards" style="display:none;"></div>

  <div id="zr-footer">
    <span></span>
    <span id="zr-timestamp"></span>
  </div>

</div>

<script>
(function () {
  var WORKER = "https://zillow-rates-proxy.testmesreeni.workers.dev/";

  var TABS = {
    "30yr": { label: "30 Yr Fixed", program: "Fixed30Year", loanType: "Conventional" },
    "15yr": { label: "15 Yr Fixed", program: "Fixed15Year", loanType: "Conventional" },
    "va":   { label: "VA",          program: "Fixed30Year", loanType: "VA"           }
  };

  // Human-readable labels for each credit/LTV tier
  var TIER_NAMES = {
    "p1": "EXCELLENT CREDIT",
    "p2": "EXCELLENT CREDIT | HIGH LTV",
    "p3": "GOOD CREDIT",
    "p4": "GOOD CREDIT | HIGH LTV",
    "p5": "STANDARD"
  };

  var state = { tab: "30yr", refinance: false };

  function fmt(v) {
    return (typeof v === "number" && v > 0) ? v.toFixed(3) + "%" : "N/A";
  }

  function calcPoints(rate, parRate) {
    return Math.max(0.001, (parRate - rate) * 4.5).toFixed(3);
  }

  function timestamp() {
    var now = new Date();
    return "Rates as of " + now.toLocaleDateString("en-US", {
      month: "long", day: "numeric", year: "numeric"
    }) + " \u00b7 " + now.toLocaleTimeString("en-US", {
      hour: "numeric", minute: "2-digit", hour12: true
    });
  }

  function setLoading() {
    document.getElementById("zr-loading").style.display = "flex";
    document.getElementById("zr-error").style.display   = "none";
    document.getElementById("zr-cards").style.display   = "none";
    document.getElementById("zr-footer").style.display  = "none";
  }
  function setError() {
    document.getElementById("zr-loading").style.display = "none";
    document.getElementById("zr-error").style.display   = "block";
    document.getElementById("zr-cards").style.display   = "none";
    document.getElementById("zr-footer").style.display  = "none";
  }
  function setContent() {
    document.getElementById("zr-loading").style.display = "none";
    document.getElementById("zr-error").style.display   = "none";
    document.getElementById("zr-cards").style.display   = "grid";
    document.getElementById("zr-footer").style.display  = "flex";
  }

  function render(data) {
    var rates   = (data && data.rates) || {};
    // Use entries so we keep the key (p1–p5) for tier labels
    var entries = Object.entries(rates).filter(function (e) { return e[1].rate > 0; });
    if (!entries.length) { setError(); return; }

    entries.sort(function (a, b) { return a[1].rate - b[1].rate; });

    var parRate = entries[entries.length - 1][1].rate;
    var cards   = document.getElementById("zr-cards");
    cards.innerHTML = "";

    entries.forEach(function (entry) {
      var key  = entry[0];
      var item = entry[1];
      var pts  = calcPoints(item.rate, parRate);
      var tier = TIER_NAMES[key] || key.toUpperCase();
      var card = document.createElement("div");
      card.className = "zr-rate-card";
      card.setAttribute("style", "padding-top:16px; padding-left:16px; padding-bottom:16px;");

      var pointsHtml = "";
      if (parseFloat(pts) > 0.001) {
        pointsHtml =
          '<div class="zr-points-row">' +
            '<span class="zr-points-arrow">&#x2198;</span>' +
            '<span class="zr-points-text">Points: <span class="zr-points-value">+' + pts + '</span></span>' +
          '</div>';
      }

      card.innerHTML =
        '<div class="zr-card-title">' + tier + '</div>' +
        '<div class="zr-rate-num">'   + fmt(item.rate) + '</div>' +
        '<div class="zr-rate-label">Interest rate</div>' +
        '<div class="zr-card-divider"></div>' +
        '<div class="zr-rate-num">'   + fmt(item.apr) + '</div>' +
        '<div class="zr-rate-label">APR</div>' +
        pointsHtml;

      cards.appendChild(card);
    });

    document.getElementById("zr-timestamp").textContent = timestamp();
    setContent();
  }

  document.querySelectorAll(".zr-toggle-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      document.querySelectorAll(".zr-toggle-btn").forEach(function (b) { b.classList.remove("zr-active"); });
      btn.classList.add("zr-active");
      state.refinance = (btn.dataset.mode === "refinance");
      fetchRates();
    });
  });

  document.querySelectorAll(".zr-tab").forEach(function (tab) {
    tab.addEventListener("click", function () {
      document.querySelectorAll(".zr-tab").forEach(function (t) { t.classList.remove("zr-active"); });
      tab.classList.add("zr-active");
      state.tab = tab.dataset.tab;
      fetchRates();
    });
  });

  function fetchRates() {
    setLoading();
    var cfg = TABS[state.tab];
    var url = WORKER +
      "?program="   + encodeURIComponent(cfg.program)  +
      "&loanType="  + encodeURIComponent(cfg.loanType) +
      "&refinance=" + state.refinance;

    fetch(url)
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(render)
      .catch(setError);
  }

  document.getElementById("zr-retry-btn").addEventListener("click", fetchRates);
  fetchRates();
})();
</script>
